name: tests

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [test, main]

jobs:
  # ── unit tests ──────────────────────────────────────────────────────────────
  # no external deps required; run on every push
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: run unit tests
        run: go test ./... -timeout 2m

      # record the one known-failing test so we don't lose track of it
      - name: note known failures
        if: always()
        run: |
          echo "TestSearchModelStaleResultsArriveAfterInputChanged is expected to FAIL"
          echo "it documents the pkgsearch stale-results bug — fix the bug to make it pass"

  # ── integration tests ───────────────────────────────────────────────────────
  # requires: git, bubblewrap, nix (no-daemon install)
  integration:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install bubblewrap
        run: sudo apt-get install -y bubblewrap

      - name: install nix (no-daemon)
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = false

      - name: run integration tests
        run: go test -tags integration ./tests/integration/... -timeout 5m -v

  # ── e2e tests ───────────────────────────────────────────────────────────────
  # builds the lagoon binary then exercises it end-to-end
  # fast tests only (no real nix builds — LAGOON_SLOW_E2E not set)
  e2e:
    name: e2e tests (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install bubblewrap
        run: sudo apt-get install -y bubblewrap

      - name: build lagoon binary
        run: go build -o lagoon .

      - name: run e2e tests (fast subset)
        env:
          LAGOON_BIN: ${{ github.workspace }}/lagoon
        run: go test -tags e2e ./tests/e2e/... -timeout 2m -v

  # ── race detector ───────────────────────────────────────────────────────────
  # run unit tests with -race to catch concurrent access bugs
  race:
    name: race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: run unit tests with race detector
        run: go test -race ./... -timeout 3m
