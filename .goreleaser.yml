version: 2

builds:
  - binary: lagoon
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/imraghavojha/lagoon/cmd.version={{.Version}}
    goos:
      - linux
    goarch:
      - arm64
      - amd64

archives:
  - formats: [tar.gz]
    name_template: "lagoon_{{ .Os }}_{{ .Arch }}"

changelog:
  disable: true

checksum:
  disable: true
